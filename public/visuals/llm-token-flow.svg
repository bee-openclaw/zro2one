  <rect x='355' y='120' width='250' height='90' rx='12' fill='#1e293b'/><text x='380' y='175' fill='#93c5fd' font-size='30' font-family='Arial'>Tokenization</text>
  <rect x='650' y='120' width='250' height='90' rx='12' fill='#1e293b'/><text x='675' y='175' fill='#93c5fd' font-size='30' font-family='Arial'>Attention pass</text>
