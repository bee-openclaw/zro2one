<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" fill="none">
  <rect width="1200" height="700" rx="24" fill="#F8FAFC"/>
  <text x="70" y="90" font-family="Inter, sans-serif" font-size="46" font-weight="800" fill="#0F172A">Machine Learning Flywheel</text>
  <text x="70" y="130" font-family="Inter, sans-serif" font-size="24" fill="#475569">Data → Training → Evaluation → Deployment → Feedback</text>

  <circle cx="600" cy="380" r="190" fill="#DBEAFE" stroke="#3B82F6" stroke-width="4"/>
  <circle cx="600" cy="380" r="120" fill="#EFF6FF"/>

  <g font-family="Inter, sans-serif" font-size="28" font-weight="700" fill="#0F172A" text-anchor="middle">
    <text x="600" y="210">Data</text>
    <text x="790" y="380">Train</text>
    <text x="600" y="555">Evaluate</text>
    <text x="410" y="380">Deploy</text>
  </g>

  <path d="M600 220 C710 230 780 290 790 360" stroke="#2563EB" stroke-width="8" stroke-linecap="round"/>
  <path d="M780 390 C760 490 690 540 610 550" stroke="#2563EB" stroke-width="8" stroke-linecap="round"/>
  <path d="M580 550 C490 530 430 470 415 400" stroke="#2563EB" stroke-width="8" stroke-linecap="round"/>
  <path d="M410 360 C430 280 500 230 580 220" stroke="#2563EB" stroke-width="8" stroke-linecap="round"/>

  <text x="600" y="370" font-family="Inter, sans-serif" font-size="30" font-weight="800" fill="#1E3A8A" text-anchor="middle">Better predictions</text>
  <text x="600" y="405" font-family="Inter, sans-serif" font-size="22" fill="#334155" text-anchor="middle">when feedback loops are tight</text>
</svg>
