<svg width="1200" height="700" viewBox="0 0 1200 700" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Prompt specification loop with goal, context, output format, and critique">
  <rect width="1200" height="700" fill="#0f172a"/>
  <text x="70" y="70" fill="#f8fafc" font-family="Inter, Arial, sans-serif" font-size="36" font-weight="700">Prompt Specification Loop</text>
  <text x="70" y="105" fill="#94a3b8" font-family="Inter, Arial, sans-serif" font-size="20">Reliable prompting is a reviewable workflow, not a one-shot trick</text>

  <circle cx="600" cy="360" r="220" fill="#111827" stroke="#334155" stroke-width="3"/>

  <rect x="500" y="170" width="200" height="90" rx="14" fill="#1d4ed8"/>
  <text x="560" y="224" fill="#e0f2fe" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700">Goal</text>

  <rect x="790" y="310" width="230" height="90" rx="14" fill="#0f766e"/>
  <text x="835" y="364" fill="#ccfbf1" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700">Context</text>

  <rect x="480" y="470" width="250" height="90" rx="14" fill="#7c3aed"/>
  <text x="510" y="524" fill="#ede9fe" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700">Output Format</text>

  <rect x="190" y="310" width="240" height="90" rx="14" fill="#b45309"/>
  <text x="230" y="364" fill="#ffedd5" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700">Critique</text>

  <path d="M700 215 C810 240, 860 280, 900 315" stroke="#93c5fd" stroke-width="5" fill="none" marker-end="url(#arr)"/>
  <path d="M905 405 C860 470, 790 500, 730 515" stroke="#99f6e4" stroke-width="5" fill="none" marker-end="url(#arr)"/>
  <path d="M480 515 C380 500, 300 460, 250 395" stroke="#ddd6fe" stroke-width="5" fill="none" marker-end="url(#arr)"/>
  <path d="M250 305 C310 240, 390 200, 500 205" stroke="#fed7aa" stroke-width="5" fill="none" marker-end="url(#arr)"/>

  <text x="430" y="360" fill="#cbd5e1" font-family="Inter, Arial, sans-serif" font-size="20">Input:</text>
  <text x="500" y="360" fill="#e2e8f0" font-family="Inter, Arial, sans-serif" font-size="20">messy request + constraints</text>
  <text x="430" y="395" fill="#cbd5e1" font-family="Inter, Arial, sans-serif" font-size="20">Output:</text>
  <text x="520" y="395" fill="#e2e8f0" font-family="Inter, Arial, sans-serif" font-size="20">structured draft with fewer edits</text>

  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#e2e8f0"/>
    </marker>
  </defs>
</svg>