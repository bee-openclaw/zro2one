<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="920" viewBox="0 0 1400 920" fill="none">
  <rect width="1400" height="920" rx="24" fill="#F8FAFC"/>
  <text x="70" y="85" font-family="Inter, sans-serif" font-size="48" font-weight="800" fill="#0F172A">How AI Fits Together</text>
  <text x="70" y="125" font-family="Inter, sans-serif" font-size="24" fill="#475569">AI ⊃ Machine Learning ⊃ Deep Learning ⊃ Foundation Models (LLMs, MLLMs)</text>

  <rect x="90" y="170" width="1220" height="680" rx="24" fill="#EEF2FF" stroke="#6366F1" stroke-width="3"/>
  <text x="130" y="220" font-family="Inter, sans-serif" font-size="32" font-weight="700" fill="#3730A3">Artificial Intelligence (AI)</text>
  <text x="130" y="255" font-family="Inter, sans-serif" font-size="20" fill="#4338CA">All methods for making systems perform intelligent tasks</text>

  <rect x="150" y="290" width="1060" height="520" rx="22" fill="#DBEAFE" stroke="#3B82F6" stroke-width="3"/>
  <text x="185" y="335" font-family="Inter, sans-serif" font-size="30" font-weight="700" fill="#1E3A8A">Machine Learning (ML)</text>

  <rect x="190" y="370" width="980" height="400" rx="20" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="3"/>
  <text x="220" y="415" font-family="Inter, sans-serif" font-size="28" font-weight="700" fill="#5B21B6">Deep Learning (DL)</text>

  <rect x="230" y="450" width="460" height="280" rx="18" fill="#DCFCE7" stroke="#22C55E" stroke-width="3"/>
  <text x="255" y="495" font-family="Inter, sans-serif" font-size="26" font-weight="700" fill="#166534">Natural Language Processing (NLP)</text>
  <text x="255" y="530" font-family="Inter, sans-serif" font-size="19" fill="#166534">Language understanding and generation</text>

  <rect x="730" y="450" width="400" height="120" rx="16" fill="#FEF3C7" stroke="#F59E0B" stroke-width="3"/>
  <text x="760" y="495" font-family="Inter, sans-serif" font-size="26" font-weight="700" fill="#92400E">LLMs</text>
  <text x="760" y="527" font-family="Inter, sans-serif" font-size="18" fill="#92400E">Text-first foundation models</text>

  <rect x="730" y="600" width="400" height="120" rx="16" fill="#FEE2E2" stroke="#EF4444" stroke-width="3"/>
  <text x="760" y="645" font-family="Inter, sans-serif" font-size="26" font-weight="700" fill="#991B1B">MLLMs</text>
  <text x="760" y="677" font-family="Inter, sans-serif" font-size="18" fill="#991B1B">Multimodal models (text + image/audio/video)</text>

  <text x="100" y="885" font-family="Inter, sans-serif" font-size="20" fill="#475569">Also inside AI (outside ML): rule-based systems, search/planning, optimization, symbolic reasoning.</text>
</svg>
